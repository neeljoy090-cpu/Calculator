<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="6f912632a3fe61baf972e14551ac6cc20800167f" content="6f912632a3fe61baf972e14551ac6cc20800167f" />
<title>Mobile Calculator</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #1e1e2f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.calculator {
    width: 300px;
    background: #2c2c3e;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.display {
    width: 100%;
    height: 60px;
    background: #000;
    color: #0f0;
    font-size: 28px;
    text-align: right;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 10px;
    box-sizing: border-box;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 55px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: #3b3b5c;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #57577a;
}

.operator {
    background: orange;
}

.equal {
    background: green;
    grid-column: span 2;
}

.clear {
    background: red;
}

.ad-banner {
    width: 100%;
    max-width: 468px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="ad-banner">
<iframe scrolling="no" 
src="https://neon.today/context/get/164114/41549/1/468/60" 
style="width:100%; height:60px; border:1px dotted grey;" 
frameborder="0"></iframe>
</div>

<div class="calculator">
    <div id="display" class="display">0</div>

    <div class="buttons">
        <button onclick="clearDisplay()" class="clear">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="append('%')">%</button>
        <button onclick="append('/')" class="operator">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')" class="operator">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')" class="operator">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')" class="operator">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");

function append(value) {
    if (display.innerText === "0") {
        display.innerText = value;
    } else {
        display.innerText += value;
    }
}

function clearDisplay() {
    display.innerText = "0";
}

function deleteLast() {
    display.innerText = display.innerText.slice(0, -1);
    if (display.innerText === "") {
        display.innerText = "0";
    }
}

function calculate() {
    try {
        display.innerText = eval(display.innerText);
    } catch {
        display.innerText = "Error";
    }
}
</script>

</body>
</html>
